<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026 рҹҸҶ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#1a1f35,#0d1221);padding:16px 20px;text-align:center;border-bottom:2px solid #2a3050;position:sticky;top:0;z-index:100}
header h1{font-size:1.4em;font-weight:700;letter-spacing:1px}
header h1 span{color:#f5c842}
.subtitle{color:#8892b0;font-size:0.8em;margin-top:3px}
.toolbar{display:none}

/* ===== PORTRAIT (default) ===== */
.phase-title{text-align:center;padding:14px 0 6px;font-size:0.75em;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#f5c842}
.games-grid{display:flex;flex-direction:column;gap:10px;padding:10px 14px 20px;max-width:600px;margin:0 auto}

/* ===== LANDSCAPE COLUMNS ===== */
.landscape-layout{display:none}
.landscape-col{flex:1;min-width:0}
.col-title{text-align:center;padding:12px 0 8px;font-size:0.7em;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#f5c842;border-bottom:1px solid #1e2540;margin-bottom:8px}
.date-divider{font-size:0.65em;color:#667;text-align:center;padding:6px 0 4px;letter-spacing:1px;text-transform:uppercase}
.day-divider{display:flex;align-items:center;gap:0;padding:14px 14px 4px;max-width:600px;margin:0 auto}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,#2a3050)}
.day-divider::after{background:linear-gradient(to left,transparent,#2a3050)}
.day-divider span{padding:0 12px;font-size:0.7em;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8892b0;white-space:nowrap}

/* ===== CARD ===== */
.game-card{background:#131829;border:2px solid #f5c842;border-radius:12px;padding:12px 14px;position:relative;overflow:hidden;transition:border-color .3s}
.game-card.live{border-color:#22bb55;animation:borderPulse 1.5s ease-in-out infinite}
.game-card.finished{border-color:#dd2222}
@keyframes borderPulse{
  0%{box-shadow:0 0 0 0 rgba(34,187,85,0.15);border-color:rgba(34,187,85,0.15)}
  50%{box-shadow:0 0 10px 2px rgba(34,187,85,0.5);border-color:rgba(34,187,85,1)}
  100%{box-shadow:0 0 0 0 rgba(34,187,85,0.15);border-color:rgba(34,187,85,0.15)}
}
.game-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.game-date{font-size:0.7em;color:#667}
.game-status{font-size:0.68em;padding:2px 8px;border-radius:20px;font-weight:700}
.status-live{background:#22bb55;color:#fff;animation:pulseFade 1.5s infinite}
.status-finished{background:#2a1a1a;color:#ff6666}
.status-notstarted{background:#1a2235;color:#667aaa}
@keyframes pulseFade{0%,100%{opacity:1}50%{opacity:0.6}}
.teams-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.team{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.team-flag{font-size:1.8em;line-height:1}
.team-name{font-size:0.75em;font-weight:600;text-align:center;color:#ccd;letter-spacing:.2px;word-break:break-word}
.team-name.tbd{color:#445;font-size:0.68em;font-style:italic}
.score-box{display:flex;align-items:center;gap:5px;flex-shrink:0}
.score{font-size:1.9em;font-weight:800;min-width:28px;text-align:center;color:#fff}
.score-sep{font-size:1.3em;color:#445;font-weight:300}
.live-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#22bb55,#88ff99,#22bb55);background-size:200%;animation:shimmer 2s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.scorers{margin-top:8px;padding-top:7px;border-top:1px solid #1e2540;display:flex;justify-content:space-between;gap:8px}
.scorer-side{flex:1;font-size:0.65em;color:#8892b0;line-height:1.5}
.scorer-side.left{text-align:left}
.scorer-side.right{text-align:right}
.scorer-item{display:flex;align-items:center;gap:3px}
.scorer-side.left .scorer-item{justify-content:flex-start}
.scorer-side.right .scorer-item{justify-content:flex-end}
.team.winner{position:relative;border-radius:10px;overflow:visible}
.team.winner::before{
  content:'';
  position:absolute;
  inset:-6px;
  border-radius:14px;
  background:radial-gradient(ellipse at center,rgba(30,120,255,0.45) 0%,rgba(30,120,255,0.08) 60%,transparent 100%);
  filter:blur(8px);
  animation:winnerGlow 2s ease-in-out infinite;
  z-index:0;
  pointer-events:none;
}
.team.winner>*{position:relative;z-index:1}
@keyframes winnerGlow{
  0%,100%{opacity:0.15;transform:scale(0.95)}
  50%{opacity:1;transform:scale(1.05)}
}

/* ===== BRACKET ===== */
#bracket-view{display:none;padding:16px 10px 30px;max-width:900px;margin:0 auto}
.bracket-wrap{overflow-x:auto}
.bracket-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;min-width:700px}
.bracket-col{display:flex;flex-direction:column;align-items:center;gap:0;padding:0 6px}
.bracket-col-title{font-size:0.65em;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#f5c842;text-align:center;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #2a3050;width:100%}
.bracket-spacer{flex:1}
.b-slot{background:#131829;border:1px solid #f5c84266;border-radius:8px;padding:8px 10px;width:100%;margin:4px 0;transition:border-color .2s}
.b-slot.live{border-color:#22bb55}
.b-slot.finished{border-color:#dd2222}
.b-team{display:flex;align-items:center;gap:6px;padding:3px 0}
.b-team-flag{font-size:1.1em}
.b-team-name{font-size:0.7em;color:#ccd;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.b-team-name.tbd{color:#445;font-style:italic;font-size:0.62em}
.b-score{font-size:0.85em;font-weight:700;color:#f5c842;min-width:14px;text-align:right}
.b-divider{height:1px;background:#1e2540;margin:2px 0}
.b-date{font-size:0.58em;color:#556;text-align:center;margin-top:4px}

#last-update{text-align:center;font-size:0.7em;color:#445;padding-bottom:20px}
.live-badge{display:inline-block;width:6px;height:6px;background:#22bb55;border-radius:50%;margin-right:5px;animation:pulseFade 1s infinite;vertical-align:middle}

/* ===== LANDSCAPE MEDIA ===== */
@media (orientation:landscape) and (min-width:600px){
  #portrait-view{display:none}
  .landscape-layout{display:flex;gap:12px;padding:10px 12px 20px;max-width:1100px;margin:0 auto}
}

/* ===== BOTTOM NAV (glassmorphism) ===== */
body{padding-bottom:80px}
.bottom-nav{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;
  background:rgba(15,20,40,0.55);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;
  padding:8px 12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.05) inset;
  z-index:200;
  min-width:240px;
  justify-content:center;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:transparent;border:none;color:rgba(255,255,255,0.5);
  padding:6px 18px;border-radius:20px;cursor:pointer;
  transition:all .25s;font-family:inherit;
}
.nav-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85)}
.nav-btn.active{background:rgba(245,200,66,0.15);color:#f5c842}
.nav-icon{font-size:1.3em;line-height:1}
.nav-label{font-size:0.6em;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* ===== LIGHT THEME ===== */
body.light{background:#f0f2f8;color:#1a1f35}
body.light header{background:linear-gradient(135deg,#e8eaf6,#dde1f5);border-bottom-color:#c5cadf}
body.light header h1{color:#1a1f35}
body.light .subtitle{color:#5c6380}
body.light .phase-title{color:#e6a800}
body.light .game-card{background:#fff;border-color:#d0d4e8}
body.light .game-card.finished{border-color:#cc2222}
body.light .game-card.live{border-color:#229944}
body.light .team-name{color:#2a3050}
body.light .game-date{color:#888}
body.light .score{color:#1a1f35}
body.light .score-sep{color:#bbb}
body.light .scorer-side{color:#5c6380}
body.light .day-divider span{color:#5c6380}
body.light .day-divider::before{background:linear-gradient(to right,transparent,#c5cadf)}
body.light .day-divider::after{background:linear-gradient(to left,transparent,#c5cadf)}
body.light .status-finished{background:#ffe5e5;color:#cc2222}
body.light .status-notstarted{background:#e8eaf6;color:#5c6380}
body.light .status-live{background:#229944;color:#fff}
body.light .bottom-nav{background:rgba(255,255,255,0.65);border-color:rgba(0,0,0,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.12)}
body.light .nav-btn{color:rgba(30,40,80,0.5)}
body.light .nav-btn:hover{background:rgba(0,0,0,0.06);color:rgba(30,40,80,0.9)}
body.light .nav-btn.active{background:rgba(230,168,0,0.15);color:#b8860b}
body.light #last-update{color:#aaa}
body.light .b-slot{background:#fff;border-color:#d0d4e8}
body.light .b-team-name{color:#2a3050}
body.light .b-date{color:#888}
body.light .bracket-col-title{color:#e6a800}
</style>
</head>
<body>
<header>
  <h1>рҹҸҶ Copa do Mundo <span>2026</span></h1>
  <div class="subtitle">Placares em tempo real В· Atualiza a cada 30s</div>

</header>

<div id="portrait-view">
  <div id="app"></div>
</div>
<div class="landscape-layout" id="landscape-view">
  <div class="landscape-col" id="col-live">
    <div class="col-title">рҹ”ҙ Ao Vivo</div>
    <div id="col-live-games"></div>
  </div>
  <div class="landscape-col" id="col-next">
    <div class="col-title">вҸ° PrГіximos</div>
    <div id="col-next-games"></div>
  </div>
  <div class="landscape-col" id="col-done">
    <div class="col-title">вң… Finalizados Hoje</div>
    <div id="col-done-games"></div>
  </div>
</div>

<div id="bracket-view">
  <div class="bracket-wrap">
    <div class="bracket-grid" id="bracket-grid"></div>
  </div>
</div>

<div id="last-update"></div>

<!-- Bottom Nav Bar -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" id="btn-list" onclick="setView('list')" title="Lista">
    <span class="nav-icon">рҹ“Ӣ</span>
    <span class="nav-label">Lista</span>
  </button>
  <button class="nav-btn" id="btn-bracket" onclick="setView('bracket')" title="Chaveamento">
    <span class="nav-icon">рҹҢі</span>
    <span class="nav-label">Chave</span>
  </button>
  <button class="nav-btn" id="btn-theme" onclick="toggleTheme()" title="Tema">
    <span class="nav-icon" id="theme-icon">вҳҖпёҸ</span>
    <span class="nav-label" id="theme-label">Claro</span>
  </button>
</nav>

<script>
var API='https://worldcup26.ir/get/games';
var currentView='list';
// Scorers que a API nГЈo fornece вҖ” fallback manual
var SCORERS_OVERRIDE={
  '89': {home_scorers:'null', away_scorers:"\"Kylian MbappГ© 70'(pen)\""}
};

var FLAGS={
  'Mexico':'рҹҮІрҹҮҪ','South Africa':'рҹҮҝрҹҮҰ','Brazil':'рҹҮ§рҹҮ·','Germany':'рҹҮ©рҹҮӘ','Argentina':'рҹҮҰрҹҮ·',
  'France':'рҹҮ«рҹҮ·','England':'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ','Spain':'рҹҮӘрҹҮё','Portugal':'рҹҮөрҹҮ№','United States':'рҹҮәрҹҮё',
  'Japan':'рҹҮҜрҹҮө','Morocco':'рҹҮІрҹҮҰ','Netherlands':'рҹҮірҹҮұ','Belgium':'рҹҮ§рҹҮӘ','Uruguay':'рҹҮәрҹҮҫ',
  'Colombia':'рҹҮЁрҹҮҙ','Switzerland':'рҹҮЁрҹҮӯ','Canada':'рҹҮЁрҹҮҰ','Norway':'рҹҮірҹҮҙ','Egypt':'рҹҮӘрҹҮ¬',
  'Paraguay':'рҹҮөрҹҮҫ','Saudi Arabia':'рҹҮёрҹҮҰ','Australia':'рҹҮҰрҹҮә','Croatia':'рҹҮӯрҹҮ·',
  'Senegal':'рҹҮёрҹҮі','Ecuador':'рҹҮӘрҹҮЁ','Chile':'рҹҮЁрҹҮұ','Korea Republic':'рҹҮ°рҹҮ·',
  'Iran':'рҹҮ®рҹҮ·','Poland':'рҹҮөрҹҮұ','Denmark':'рҹҮ©рҹҮ°','Serbia':'рҹҮ·рҹҮё','Ukraine':'рҹҮәрҹҮҰ',
  'Turkey':'рҹҮ№рҹҮ·','Peru':'рҹҮөрҹҮӘ','Venezuela':'рҹҮ»рҹҮӘ','Panama':'рҹҮөрҹҮҰ','Honduras':'рҹҮӯрҹҮі',
  'Costa Rica':'рҹҮЁрҹҮ·','Jamaica':'рҹҮҜрҹҮІ','Bolivia':'рҹҮ§рҹҮҙ','New Zealand':'рҹҮірҹҮҝ','Indonesia':'рҹҮ®рҹҮ©'
};
var PHASES={'r16':'вҡ”пёҸ Oitavas de Final','qf':'рҹҺҜ Quartas de Final','sf':'рҹ”Ҙ Semifinais','third':'рҹҘү Disputa de 3Вә Lugar','final':'рҹҸҶ Final'};
var DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','SГЎb'];

function flag(n){return(n&&FLAGS[n])?FLAGS[n]:'рҹҸіпёҸ';}

function parseDate(s){
  if(!s)return null;
  var m=s.match(/(\d{2})\/(\d{2})\/(\d{4}) (\d{2}):(\d{2})/);
  if(!m)return null;
  return new Date(m[3]+'-'+m[1]+'-'+m[2]+'T'+m[4]+':'+m[5]+':00');
}

function fmtDate(s){
  var d=parseDate(s);
  if(!d)return s||'';
  var dia=DIAS[d.getDay()];
  var dd=String(d.getDate()).padStart(2,'0');
  var mm=String(d.getMonth()+1).padStart(2,'0');
  var hh=String(d.getHours()).padStart(2,'0');
  var min=String(d.getMinutes()).padStart(2,'0');
  return dia+', '+dd+'/'+mm+', '+hh+':'+min;
}

function isToday(s){
  var d=parseDate(s);
  if(!d)return false;
  var now=new Date();
  return d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
}
function isTomorrow(s){
  var d=parseDate(s);
  if(!d)return false;
  var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  return d.getDate()===tomorrow.getDate()&&d.getMonth()===tomorrow.getMonth()&&d.getFullYear()===tomorrow.getFullYear();
}

function parseScorers(raw){
  if(!raw||raw==='null'||raw==='{}')return[];
  var result=[];
  var re=/"([^"]+)"/g, m;
  while((m=re.exec(raw))!==null){
    var p=m[1].trim();
    if(p&&p!=='null')result.push(p);
  }
  return result;
}

function buildGameMap(games){
  var map={};
  for(var i=0;i<games.length;i++){
    var g=games[i];
    var home=g.home_team_name_en,away=g.away_team_name_en;
    var hs=parseInt(g.home_score)||0,as_=parseInt(g.away_score)||0;
    var finished=g.finished==='TRUE'||g.time_elapsed==='finished';
    var winner=null,loser=null;
    if(finished&&home&&away){
      var hps=g.home_penalty_score&&g.home_penalty_score!=='null'?parseInt(g.home_penalty_score):null;
      var aps=g.away_penalty_score&&g.away_penalty_score!=='null'?parseInt(g.away_penalty_score):null;
      if(hps!==null&&aps!==null){winner=hps>aps?home:away;loser=hps>aps?away:home;}
      else{winner=hs>as_?home:away;loser=hs>as_?away:home;}
    }
    map[g.id]={home:home,away:away,homeLabel:g.home_team_label,awayLabel:g.away_team_label,winner:winner,loser:loser,finished:finished};
  }
  return map;
}

function resolveSlot(label,gameMap,depth){
  if(!label)return{name:null,candidates:null};
  if(depth>6)return{name:null,candidates:'вҖ”'};
  var mw=label.match(/Winner Match (\d+)/i);
  if(mw){
    var ref=gameMap[mw[1]];
    if(!ref)return{name:null,candidates:'вҖ”'};
    if(ref.winner)return{name:ref.winner,candidates:null};
    var h=resolveSlot(ref.homeLabel||ref.home,gameMap,depth+1);
    var a=resolveSlot(ref.awayLabel||ref.away,gameMap,depth+1);
    var hN=h.name||h.candidates||'?';
    var aN=a.name||a.candidates||'?';
    // Se os candidatos forem muito complexos (muitos "ou"), simplificar com travessГЈo
    var combined=hN+' ou '+aN;
    if((combined.match(/ ou /g)||[]).length>=3)return{name:null,candidates:'вҖ”'};
    return{name:null,candidates:combined};
  }
  var ml=label.match(/Loser Match (\d+)/i);
  if(ml){
    var ref2=gameMap[ml[1]];
    if(!ref2)return{name:null,candidates:'вҖ”'};
    if(ref2.loser)return{name:ref2.loser,candidates:null};
    return{name:null,candidates:'вҖ”'};
  }
  return{name:label,candidates:null};
}

function statusLabel(g){
  if(g.time_elapsed==='live')return'<span class="game-status status-live"><span class="live-badge"></span>AO VIVO</span>';
  if(g.finished==='TRUE'||g.time_elapsed==='finished')return'<span class="game-status status-finished">Encerrado</span>';
  return'<span class="game-status status-notstarted">'+fmtDate(g.local_date)+'</span>';
}

function renderScorers(g){
  var hs=parseScorers(g.home_scorers);
  var as_=parseScorers(g.away_scorers);
  if(!hs.length&&!as_.length)return'';
  var leftHtml='',rightHtml='';
  for(var i=0;i<hs.length;i++)leftHtml+='<div class="scorer-item">вҡҪ '+hs[i]+'</div>';
  for(var i=0;i<as_.length;i++)rightHtml+='<div class="scorer-item">'+as_[i]+' вҡҪ</div>';
  return'<div class="scorers"><div class="scorer-side left">'+leftHtml+'</div><div class="scorer-side right">'+rightHtml+'</div></div>';
}

function renderCard(g,gameMap,compact){
  var isLive=g.time_elapsed==='live';
  var isDone=g.finished==='TRUE'||g.time_elapsed==='finished';
  var cls=isLive?'live':isDone?'finished':'';
  var homeR=g.home_team_name_en?{name:g.home_team_name_en,candidates:null}:resolveSlot(g.home_team_label,gameMap,0);
  var awayR=g.away_team_name_en?{name:g.away_team_name_en,candidates:null}:resolveSlot(g.away_team_label,gameMap,0);
  var homeName=homeR.name||(homeR.candidates||'вҖ”');
  var awayName=awayR.name||(awayR.candidates||'вҖ”');
  var homeIsTbd=!homeR.name;
  var awayIsTbd=!awayR.name;
  var hf=homeR.name?flag(homeR.name):'вҡ”пёҸ';
  var af=awayR.name?flag(awayR.name):'вҡ”пёҸ';
  var hs=(isDone||isLive)?g.home_score:'-';
  var as_=(isDone||isLive)?g.away_score:'-';
  var scorersHtml=(isDone||isLive)?renderScorers(g):'';
  // Fallback: usar override se scorers vazios
  if((isDone||isLive)&&!scorersHtml&&SCORERS_OVERRIDE[g.id]){
    var ov=SCORERS_OVERRIDE[g.id];
    var gOv={home_scorers:ov.home_scorers,away_scorers:ov.away_scorers};
    scorersHtml=renderScorers(gOv);
  }
  // Determinar vencedor para glow azul
  var homeWon=false,awayWon=false;
  if(isDone&&!homeIsTbd&&!awayIsTbd){
    var hsc=parseInt(g.home_score)||0, asc=parseInt(g.away_score)||0;
    var hps=g.home_penalty_score&&g.home_penalty_score!=='null'?parseInt(g.home_penalty_score):null;
    var aps=g.away_penalty_score&&g.away_penalty_score!=='null'?parseInt(g.away_penalty_score):null;
    if(hps!==null&&aps!==null){homeWon=hps>aps;awayWon=aps>hps;}
    else{homeWon=hsc>asc;awayWon=asc>hsc;}
  }
  return'<div class="game-card '+cls+'">'+(isLive?'<div class="live-bar"></div>':'')+
    '<div class="game-meta"><span class="game-date">'+g.group+'</span>'+statusLabel(g)+'</div>'+
    '<div class="teams-row">'+
      '<div class="team'+(homeWon?' winner':'')+'"><div class="team-flag">'+hf+'</div><div class="team-name'+(homeIsTbd?' tbd':'')+'">'+homeName+'</div></div>'+
      '<div class="score-box"><div class="score">'+hs+'</div><div class="score-sep">:</div><div class="score">'+as_+'</div></div>'+
      '<div class="team'+(awayWon?' winner':'')+'"><div class="team-flag">'+af+'</div><div class="team-name'+(awayIsTbd?' tbd':'')+'">'+awayName+'</div></div>'+
    '</div>'+scorersHtml+
  '</div>';
}

function getDayKey(s){
  var d=parseDate(s);
  if(!d)return'';
  return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
}
function getDayLabel(s){
  var d=parseDate(s);
  if(!d)return'';
  var dias=['Domingo','Segunda','TerГ§a','Quarta','Quinta','Sexta','SГЎbado'];
  return dias[d.getDay()];
}
function renderPortrait(games,gameMap){
  var order=['r16','qf','sf','third','final'];
  var html='';
  for(var i=0;i<order.length;i++){
    var ph=order[i];
    var pg=games.filter(function(g){return g.type===ph;});
    if(!pg.length)continue;
    html+='<div class="phase-title">'+PHASES[ph]+'</div>';
    var lastDay='';
    html+='<div class="games-grid">';
    for(var j=0;j<pg.length;j++){
      var g=pg[j];
      var dayKey=getDayKey(g.local_date);
      if(dayKey&&dayKey!==lastDay){
        if(lastDay!==''){
          html+='</div><div class="day-divider"><span>'+getDayLabel(g.local_date)+'</span></div><div class="games-grid">';
        }
        lastDay=dayKey;
      }
      html+=renderCard(g,gameMap,false);
    }
    html+='</div>';
  }
  document.getElementById('app').innerHTML=html;
}

function renderLandscape(games,gameMap){
  var liveGames=games.filter(function(g){return g.time_elapsed==='live';});
  var doneToday=games.filter(function(g){return(g.finished==='TRUE'||g.time_elapsed==='finished')&&isToday(g.local_date);});
  var upcoming=games.filter(function(g){
    return g.time_elapsed!=='live'&&g.finished!=='TRUE'&&g.time_elapsed!=='finished'&&(isToday(g.local_date)||isTomorrow(g.local_date));
  });

  // Live col
  var liveHtml='';
  if(!liveGames.length)liveHtml='<div style="text-align:center;padding:20px;color:#445;font-size:0.8em">Nenhum jogo ao vivo</div>';
  for(var i=0;i<liveGames.length;i++)liveHtml+=renderCard(liveGames[i],gameMap,true);
  document.getElementById('col-live-games').innerHTML=liveHtml;

  // Next col вҖ” separar hoje e amanhГЈ
  var nextHtml='';
  var todayGames=upcoming.filter(function(g){return isToday(g.local_date);});
  var tomorrowGames=upcoming.filter(function(g){return isTomorrow(g.local_date);});
  if(!todayGames.length&&!tomorrowGames.length)nextHtml='<div style="text-align:center;padding:20px;color:#445;font-size:0.8em">Nenhum jogo hoje/amanhГЈ</div>';
  if(todayGames.length){nextHtml+='<div class="date-divider">Hoje</div>';for(var i=0;i<todayGames.length;i++)nextHtml+=renderCard(todayGames[i],gameMap,true);}
  if(tomorrowGames.length){nextHtml+='<div class="date-divider">AmanhГЈ</div>';for(var i=0;i<tomorrowGames.length;i++)nextHtml+=renderCard(tomorrowGames[i],gameMap,true);}
  document.getElementById('col-next-games').innerHTML=nextHtml;

  // Done col
  var doneHtml='';
  if(!doneToday.length)doneHtml='<div style="text-align:center;padding:20px;color:#445;font-size:0.8em">Nenhum jogo finalizado hoje</div>';
  for(var i=0;i<doneToday.length;i++)doneHtml+=renderCard(doneToday[i],gameMap,true);
  document.getElementById('col-done-games').innerHTML=doneHtml;
}

function renderBracket(games,gameMap){
  var r16=games.filter(function(g){return g.type==='r16';});
  var qf=games.filter(function(g){return g.type==='qf';});
  var sf=games.filter(function(g){return g.type==='sf';});
  var fin=games.filter(function(g){return g.type==='final';});
  var third=games.filter(function(g){return g.type==='third';});

  function bSlot(g){
    var isLive=g&&g.time_elapsed==='live';
    var isDone=g&&(g.finished==='TRUE'||g.time_elapsed==='finished');
    var cls=isLive?'live':isDone?'finished':'';
    if(!g)return'<div class="b-slot"><div class="b-team"><span class="b-team-flag">вҡ”пёҸ</span><span class="b-team-name tbd">A definir</span></div><div class="b-divider"></div><div class="b-team"><span class="b-team-flag">вҡ”пёҸ</span><span class="b-team-name tbd">A definir</span></div></div>';
    var hR=g.home_team_name_en?{name:g.home_team_name_en}:resolveSlot(g.home_team_label,gameMap,0);
    var aR=g.away_team_name_en?{name:g.away_team_name_en}:resolveSlot(g.away_team_label,gameMap,0);
    var hN=hR.name||(hR.candidates||'вҖ”');
    var aN=aR.name||(aR.candidates||'вҖ”');
    var hf=hR.name?flag(hR.name):'вҡ”пёҸ';
    var af=aR.name?flag(aR.name):'вҡ”пёҸ';
    var hs=(isDone||isLive)?g.home_score:'';
    var as_=(isDone||isLive)?g.away_score:'';
    var dateStr=fmtDate(g.local_date);
    return'<div class="b-slot '+cls+'">'+
      '<div class="b-team"><span class="b-team-flag">'+hf+'</span><span class="b-team-name'+(hR.name?'':' tbd')+'">'+hN+'</span><span class="b-score">'+hs+'</span></div>'+
      '<div class="b-divider"></div>'+
      '<div class="b-team"><span class="b-team-flag">'+af+'</span><span class="b-team-name'+(aR.name?'':' tbd')+'">'+aN+'</span><span class="b-score">'+as_+'</span></div>'+
      '<div class="b-date">'+dateStr+'</div>'+
    '</div>';
  }

  // 5 colunas: R16 (left 4), QF, SF, FINAL+THIRD, R16 (right 4)
  var html='';
  // Col 1 вҖ” R16 esquerda (jogos 0-3)
  html+='<div class="bracket-col"><div class="bracket-col-title">Oitavas</div>';
  for(var i=0;i<4;i++)html+=bSlot(r16[i]||null);
  html+='</div>';
  // Col 2 вҖ” QF esquerda (0-1)
  html+='<div class="bracket-col"><div class="bracket-col-title">Quartas</div><div style="height:60px"></div>';
  for(var i=0;i<2;i++)html+=bSlot(qf[i]||null);
  html+='</div>';
  // Col 3 вҖ” SF + Final + 3Вә
  html+='<div class="bracket-col"><div class="bracket-col-title">Semi / Final</div><div style="height:100px"></div>';
  if(sf[0])html+=bSlot(sf[0]);
  html+='<div style="height:16px"></div>';
  if(fin[0])html+='<div style="border:1px solid #f5c84240;border-radius:8px;padding:6px;margin:4px 0;text-align:center;font-size:0.65em;color:#f5c842;letter-spacing:1px">рҹҸҶ FINAL</div>'+bSlot(fin[0]);
  html+='<div style="height:8px"></div>';
  if(third[0])html+='<div style="text-align:center;font-size:0.6em;color:#8892b0;padding:4px">рҹҘү 3Вә Lugar</div>'+bSlot(third[0]);
  html+='</div>';
  // Col 4 вҖ” QF direita (2-3)
  html+='<div class="bracket-col"><div class="bracket-col-title">Quartas</div><div style="height:60px"></div>';
  for(var i=2;i<4;i++)html+=bSlot(qf[i]||null);
  html+='</div>';
  // Col 5 вҖ” R16 direita (4-7)
  html+='<div class="bracket-col"><div class="bracket-col-title">Oitavas</div>';
  for(var i=4;i<8;i++)html+=bSlot(r16[i]||null);
  html+='</div>';

  document.getElementById('bracket-grid').innerHTML=html;
}

function setView(v){
  currentView=v;
  var btnList=document.getElementById('btn-list');
  var btnBracket=document.getElementById('btn-bracket');
  if(btnList)btnList.className='nav-btn'+(v==='list'?' active':'');
  if(btnBracket)btnBracket.className='nav-btn'+(v==='bracket'?' active':'');
  var pv=document.getElementById('portrait-view');
  var lv=document.getElementById('landscape-view');
  var bv=document.getElementById('bracket-view');
  if(pv)pv.style.display=v==='bracket'?'none':'';
  if(lv)lv.style.display='';
  if(bv)bv.style.display=v==='bracket'?'block':'none';
  // Re-renderizar com dados em cache ao trocar de view
  if(cachedGames&&cachedGames.length){
    var gameMap=buildGameMap(cachedGames);
    var knockout=cachedGames.filter(function(g){return['r16','qf','sf','third','final'].indexOf(g.type)!==-1;});
    if(v==='bracket'){
      renderBracket(knockout,gameMap);
    } else {
      renderPortrait(knockout,gameMap);
      renderLandscape(knockout,gameMap);
    }
  }
}

var cachedGames=null;
function renderAll(games){
  cachedGames=games;
  var gameMap=buildGameMap(games);
  var knockout=games.filter(function(g){return['r16','qf','sf','third','final'].indexOf(g.type)!==-1;});
  if(currentView==='list'){
    renderPortrait(knockout,gameMap);
    renderLandscape(knockout,gameMap);
  }else{
    renderBracket(knockout,gameMap);
  }
  document.getElementById('last-update').innerHTML='Atualizado Г s '+new Date().toLocaleTimeString('pt-BR');
}

function load(){
  fetch(API+'?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){renderAll(d.games||[]);})
    .catch(function(){
      document.getElementById('app').innerHTML='<div style="text-align:center;padding:40px;color:#667">Erro ao carregar. Recarregue a pГЎgina.</div>';
    });
}

// Tema
function toggleTheme(){
  var isLight=document.body.classList.toggle('light');
  document.getElementById('theme-icon').textContent=isLight?'рҹҢҷ':'вҳҖпёҸ';
  document.getElementById('theme-label').textContent=isLight?'Escuro':'Claro';
  localStorage.setItem('copa2026-theme',isLight?'light':'dark');
}
load();
setInterval(load,30000);

// Restaurar tema e estado inicial APГ“S DOM completo
document.addEventListener('DOMContentLoaded',function(){
  if(localStorage.getItem('copa2026-theme')==='light'){
    document.body.classList.add('light');
    var ti=document.getElementById('theme-icon');
    var tl=document.getElementById('theme-label');
    if(ti)ti.textContent='рҹҢҷ';
    if(tl)tl.textContent='Escuro';
  }
  setView('list');
});
</script>
